name: deo
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  # Python
  - python=3.12

  # PyTorch
  - pytorch::pytorch::2.5.1=py3.12_cuda12.4_cudnn9.1.0_0
  - pytorch::pytorch-cuda=12.4
  - pytorch::pytorch-mutex=1.0=cuda
  - pytorch::torchvision::0.20.1=py312_cu124_0
  - pytorch::torchaudio=2.5.1

  # Core ML packages
  - conda-forge::timm
  - conda-forge::einops
  - conda-forge::kornia
  - conda-forge::h5py

  # Data & utilities
  - conda-forge::numpy
  - conda-forge::pillow
  - conda-forge::matplotlib
  - conda-forge::scikit-image

  # System & tools
  - conda-forge::pyyaml
  - conda-forge::click

  # Monitoring & logging
  - conda-forge::wandb
  - conda-forge::tqdm

  # Development
  - conda-forge::jupyter
  - conda-forge::ipython

  # pip dependencies
  - pip
  - pip:
    - xformers>=0.0.28
    - submitit  # For SLURM job submission if needed
